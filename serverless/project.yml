packages:
  - name: default
    functions:
      - name: auth-api
        runtime: nodejs:22
        web: true
        limits:
          timeout: 10000
          memory: 256

environment:
  DATABASE_URL: ${DATABASE_URL}
  AUTH_JWT_SECRET: ${AUTH_JWT_SECRET}
  SENDGRID_API_KEY: ${SENDGRID_API_KEY}
  FROM_EMAIL: ${FROM_EMAIL}
  APP_BASE_URL: ${APP_BASE_URL}
  LOG_DESTINATIONS: ${LOG_DESTINATIONS}
